---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: restactions.templates.krateo.io
spec:
  group: templates.krateo.io
  names:
    categories:
    - krateo
    - rest
    - actions
    kind: RESTAction
    listKind: RESTActionList
    plural: restactions
    shortNames:
    - ra
    singular: restaction
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: RESTAction allows users to declaratively define calls to APIs
          that may in turn depend on other calls.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: RESTActionSpec defines the api handler specifications.
            properties:
              api:
                items:
                  description: API represents a request to an HTTP service
                  properties:
                    continueOnError:
                      type: boolean
                    dependsOn:
                      description: DependsOn reference to another API on which this
                        depends
                      properties:
                        iterator:
                          description: Iterator defines a field on which iterate.
                          type: string
                        name:
                          description: Name of another API on which this depends
                          type: string
                      required:
                      - name
                      type: object
                    endpointRef:
                      description: EndpointRef a reference to an Endpoint
                      properties:
                        name:
                          description: Name of the referenced object.
                          type: string
                        namespace:
                          description: Namespace of the referenced object.
                          type: string
                      required:
                      - name
                      - namespace
                      type: object
                    errorKey:
                      type: string
                    exportJwt:
                      type: boolean
                    filter:
                      type: string
                    headers:
                      description: Headers is an array of custom request headers
                      items:
                        type: string
                      type: array
                      x-kubernetes-list-type: atomic
                    name:
                      description: Name is a (unique) identifier
                      type: string
                    path:
                      description: Path is the request URI path
                      type: string
                    payload:
                      description: Payload is the request body
                      type: string
                    userAccessFilter:
                      description: |-
                        UserAccessFilter declares that this API call dispatches via
                        the snowplow ServiceAccount (cluster-wide read) and that the
                        returned result set MUST be in-process-refiltered through
                        EvaluateRBAC before being returned to the caller. Added at
                        Tag 0.30.9 Sub-scope A — atomic ship: when present, both
                        ServiceAccount-dispatch AND refilter take effect; there is
                        no per-mechanism toggle. Optional — RestActions without this
                        field unchanged from 0.30.8 (per-user-token dispatch).

                        Per Revision 2 (binding): even with UserAccessFilter set,
                        EvaluateRBAC continues to fire on the dispatch CR itself —
                        UserAccessFilter changes WHO dispatches the inner call, NOT
                        whether the outer dispatch is RBAC-gated. The refilter step
                        also calls EvaluateRBAC per object returned by the SA call.
                      properties:
                        group:
                          description: |-
                            Group is the API group of the checked resource. Empty string
                            = core group. Required (use "" explicitly for core).
                          type: string
                        namespaceFrom:
                          description: |-
                            NamespaceFrom is a JQ path expression evaluated against each
                            returned object to derive the per-object namespace for the
                            EvaluateRBAC call. Typical values:
                              - ".metadata.name" when the returned objects ARE namespaces
                                (cluster-scoped check by name, returns namespace itself).
                              - ".metadata.namespace" when the returned objects live IN
                                namespaces (e.g. CustomResourceDefinitions don't, but
                                compositions do).
                              - "" / unset when the resource is cluster-scoped and the
                                RBAC check is also cluster-scoped (namespace="").
                          type: string
                        resource:
                          description: |-
                            Resource is the plural resource name (e.g. "namespaces").
                            Required.
                          type: string
                        verb:
                          description: |-
                            Verb is the Kubernetes RBAC verb checked per object.
                            Required. Lower-case ("get", "list", "watch", etc.).
                          type: string
                      required:
                      - group
                      - resource
                      - verb
                      type: object
                    verb:
                      description: Verb is the request method (GET if omitempty)
                      type: string
                  required:
                  - name
                  type: object
                type: array
                x-kubernetes-list-type: atomic
              filter:
                type: string
            type: object
          status:
            type: object
            x-kubernetes-preserve-unknown-fields: true
        required:
        - metadata
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
