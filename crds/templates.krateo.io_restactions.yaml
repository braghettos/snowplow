---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: restactions.templates.krateo.io
spec:
  group: templates.krateo.io
  names:
    categories:
    - krateo
    - rest
    - actions
    kind: RESTAction
    listKind: RESTActionList
    plural: restactions
    shortNames:
    - ra
    singular: restaction
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: RESTAction allows users to declaratively define calls to APIs
          that may in turn depend on other calls.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: RESTActionSpec defines the api handler specifications.
            properties:
              api:
                items:
                  description: API represents a request to an HTTP service
                  properties:
                    continueOnError:
                      type: boolean
                    dependsOn:
                      description: DependsOn reference to another API on which this
                        depends
                      properties:
                        iterator:
                          description: Iterator defines a field on which iterate.
                          type: string
                        name:
                          description: Name of another API on which this depends
                          type: string
                      required:
                      - name
                      type: object
                    endpointRef:
                      description: EndpointRef a reference to an Endpoint
                      properties:
                        name:
                          description: Name of the referenced object.
                          type: string
                        namespace:
                          description: Namespace of the referenced object.
                          type: string
                      required:
                      - name
                      - namespace
                      type: object
                    errorKey:
                      type: string
                    exportJwt:
                      type: boolean
                    filter:
                      type: string
                    headers:
                      description: Headers is an array of custom request headers
                      items:
                        type: string
                      type: array
                      x-kubernetes-list-type: atomic
                    name:
                      description: Name is a (unique) identifier
                      type: string
                    path:
                      description: Path is the request URI path
                      type: string
                    payload:
                      description: Payload is the request body
                      type: string
                    userAccessFilter:
                      description: |-
                        UserAccessFilter declares a per-user RBAC check applied to each item
                        of the call's response array. Snowplow evaluates the check via
                        RBACWatcher.EvaluateRBAC (in-memory, ~10-50 µs per item, zero K8s
                        API roundtrips) using the user identity from xcontext.UserInfo(ctx).

                        Presence of UserAccessFilter on an api[] entry has TWO effects:
                          1. The HTTP call is dispatched using snowplow's own ServiceAccount
                             identity (the in-cluster SA token + CA mounted in the pod,
                             exposed via rest.InClusterConfig() and converted to an
                             endpoints.Endpoint at request time).
                          2. The response is filtered per requesting user before being merged
                             into the resolution dict.

                        If EndpointRef IS set, EndpointRef wins (operator escape hatch);
                        the filter still applies.
                      properties:
                        group:
                          description: |-
                            Group is the K8s API group of the filtered resource. Empty string
                            for core resources (e.g. namespaces, pods).
                          type: string
                        namespaceFrom:
                          description: |-
                            NamespaceFrom is a jq expression evaluated against each item to
                            extract the namespace used in the RBAC check. When empty or omitted
                            the filter treats the resource as cluster-scoped (namespace="").
                          type: string
                        resource:
                          description: Resource is the K8s plural resource name.
                          type: string
                        verb:
                          description: 'Verb is the RBAC verb to evaluate. One of:
                            get, list, watch.'
                          enum:
                          - get
                          - list
                          - watch
                          type: string
                      required:
                      - resource
                      - verb
                      type: object
                    verb:
                      description: Verb is the request method (GET if omitted)
                      type: string
                  required:
                  - name
                  type: object
                  x-kubernetes-validations:
                  - message: api[].userAccessFilter requires non-empty verb and resource
                    rule: '!(has(self.userAccessFilter) && (self.userAccessFilter.verb
                      == '''' || self.userAccessFilter.resource == ''''))'
                  - message: api[].userAccessFilter is only allowed with read HTTP
                      verbs (GET, HEAD)
                    rule: '!(has(self.userAccessFilter) && has(self.verb) && !(self.verb
                      in [''GET'',''HEAD'',''get'',''head'']))'
                  - message: api[].userAccessFilter is incompatible with exportJwt=true
                    rule: '!(has(self.userAccessFilter) && has(self.exportJwt) &&
                      self.exportJwt == true)'
                type: array
                x-kubernetes-list-type: atomic
              filter:
                type: string
            type: object
          status:
            type: object
            x-kubernetes-preserve-unknown-fields: true
        required:
        - metadata
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
