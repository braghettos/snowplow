apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: all-routes
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  api:
  - name: namespaces
    path: "/api/v1/namespaces"
    # Q-RBAC-DECOUPLE C(d): elevated read via snowplow's SA, then
    # per-user RBAC drop using the namespace name as the RBAC namespace.
    userAccessFilter:
      verb: list
      group: ""
      resource: namespaces
      namespaceFrom: "."
    filter: "[.namespaces.items[] | .metadata.name]"
  - name: routes
    continueOnError: true
    dependsOn:
      name: namespaces
      iterator: .namespaces
    path: ${ "/apis/widgets.templates.krateo.io/v1beta1/namespaces/" + (.) + "/routes" }
  filter: >
    {
      routes: (
        if (.routes | type) == "array" then
          [.routes[]?.items[]?]
        elif (.routes | type) == "object" then
          [.routes.items[]?]
        else
          []
        end
      )
    }
