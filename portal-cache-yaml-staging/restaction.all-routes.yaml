apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: all-routes
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  api:
  - name: namespaces
    path: "/api/v1/namespaces"
    # Q-RBAC-DECOUPLE C(d) + Q-UAF-FIX (2026-05-08): elevated read via
    # snowplow's SA, then per-user RBAC drop. UAF must check the SAME
    # namespace-scoped resource the next api[] stage will hit (`routes`),
    # NOT the cluster-scoped `namespaces` resource (which Phase-2 RB checks
    # cannot grant by design — was a latent bug, fixed 2026-05-08).
    userAccessFilter:
      verb: list
      group: widgets.templates.krateo.io
      resource: routes
      namespaceFrom: "."
    filter: "[.namespaces.items[] | .metadata.name]"
  - name: routes
    continueOnError: true
    dependsOn:
      name: namespaces
      iterator: .namespaces
    path: ${ "/apis/widgets.templates.krateo.io/v1beta1/namespaces/" + (.) + "/routes" }
  filter: >
    {
      routes: (
        if (.routes | type) == "array" then
          [.routes[]?.items[]?]
        elif (.routes | type) == "object" then
          [.routes.items[]?]
        else
          []
        end
      )
    }
