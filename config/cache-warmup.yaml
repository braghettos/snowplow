warmup:
  # GVRs derived from the krateoplatformops-blueprints/portal chart (v1.1.0)
  # plus CompositionDefinitions across all 20 bench namespaces.
  gvrs:

    # ── RESTActions ───────────────────────────────────────────────────────────
    - group: templates.krateo.io
      version: v1
      resource: restactions
      ttl: 6h

    # ── Widgets ───────────────────────────────────────────────────────────────
    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: pages

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: panels

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: rows

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: columns

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: buttons

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: buttongroups

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: datagrids

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: filters

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: navmenus

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: navmenuitems

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: piecharts

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: routes

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: routesloaders

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: tables

    # ── Core Krateo types ────────────────────────────────────────────────────
    # Warmed cluster-wide (all namespaces including the 20 bench namespaces).
    - group: core.krateo.io
      version: v1alpha1
      resource: compositiondefinitions
      ttl: 24h

    # ── Kubernetes core ───────────────────────────────────────────────────────
    - group: ""
      version: v1
      resource: namespaces
      ttl: 24h

    - group: ""
      version: v1
      resource: configmaps
      ttl: 6h

  # Discovery categories to pre-cache for the /list endpoint.
  categories:
    - krateoplatformops
    - krateo
    - widgets
