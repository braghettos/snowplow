warmup:
  # GVRs derived from the krateoplatformops-blueprints/portal chart (v1.1.0).
  # Every resource kind rendered by the portal blueprint is listed here so that
  # snowplow's cache is fully warm before the first request is served.
  gvrs:

    # ── RESTActions (templates.krateo.io/v1) ─────────────────────────────────
    # All API calls wired into pages/panels go through RESTActions.
    - group: templates.krateo.io
      version: v1
      resource: restactions
      ttl: 6h

    # ── Widgets (widgets.templates.krateo.io/v1beta1) ─────────────────────────
    # Every widget kind used by the portal blueprint.

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: pages

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: panels

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: rows

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: columns

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: buttons

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: buttongroups

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: datagrids

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: filters

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: navmenus

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: navmenuitems

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: piecharts

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: routes

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: routesloaders

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: tables

    # ── Core Krateo types ─────────────────────────────────────────────────────
    - group: core.krateo.io
      version: v1alpha1
      resource: compositiondefinitions
      ttl: 24h

    - group: core.krateo.io
      version: v1alpha1
      resource: schemadefinitions
      ttl: 24h

    # ── Kubernetes core resources ─────────────────────────────────────────────
    - group: ""
      version: v1
      resource: namespaces
      ttl: 24h

    - group: ""
      version: v1
      resource: configmaps
      ttl: 6h

  # Discovery categories to pre-cache for the /list endpoint.
  categories:
    - krateoplatformops
    - krateo
    - widgets
