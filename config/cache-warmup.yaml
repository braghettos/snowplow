warmup:
  # GVRs to pre-populate at startup for zero cold miss on first user request.
  # Only list "infrastructure" GVRs here (widgets, RESTActions, core Krateo
  # types). All other GVRs are cached automatically on first access and then
  # kept fresh by dynamically-started informers -- no manual entries needed.
  gvrs:

    # ── RESTActions ───────────────────────────────────────────────────────────
    - group: templates.krateo.io
      version: v1
      resource: restactions
      ttl: 6h

    # ── Widgets ───────────────────────────────────────────────────────────────
    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: pages

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: panels

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: rows

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: columns

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: buttons

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: buttongroups

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: datagrids

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: filters

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: navmenus

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: navmenuitems

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: piecharts

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: routes

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: routesloaders

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: tables

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: barcharts

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: linecharts

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: eventlists

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: flowcharts

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: forms

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: markdowns

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: paragraphs

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: tablists

    - group: widgets.templates.krateo.io
      version: v1beta1
      resource: yamlviewers

    # ── Core Krateo types ────────────────────────────────────────────────────
    - group: core.krateo.io
      version: v1alpha1
      resource: compositiondefinitions
      ttl: 24h

    # ── Kubernetes core ───────────────────────────────────────────────────────
    - group: ""
      version: v1
      resource: namespaces
      ttl: 24h

    - group: ""
      version: v1
      resource: configmaps
      ttl: 6h

    - group: apiextensions.k8s.io
      version: v1
      resource: customresourcedefinitions
      ttl: 24h

  # RESTActions to pre-warm in L1 at startup (resolved for every known user).
  # These are the navigation and dashboard RESTActions that the frontend calls
  # on every page load, so zero cold miss matters here.
  l1RestActions:
    - name: all-routes
      namespace: krateo-system
    - name: blueprints-list
      namespace: krateo-system
    - name: compositions-list
      namespace: krateo-system
    - name: compositions-get-ns-and-crd
      namespace: krateo-system
    - name: blueprints-panels
      namespace: krateo-system
    - name: compositions-panels
      namespace: krateo-system
    - name: sidebar-nav-menu-items
      namespace: krateo-system

  # Discovery categories to pre-cache for the /list endpoint.
  categories:
    - krateoplatformops
    - krateo
    - widgets
